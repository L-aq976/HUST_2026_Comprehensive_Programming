<!-- templates/visualize_index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络拓扑可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-block {
            width: 100%;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
        }
        
        .result-section {
            margin-top: 30px;
        }
        
        .result-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .result-card h3 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        
        .visualization-container {
            margin-top: 20px;
        }
        
        .visualization {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .info-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            margin-top: 5px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .tab-container {
            margin-bottom: 20px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-right: 5px;
            border-radius: 8px 8px 0 0;
        }
        
        .tab:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            font-weight: 600;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .source-node { background-color: #6baed6; }
        .dest-node { background-color: #74c476; }
        .both-node { background-color: #fd8d3c; }
        
        .file-upload {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        
        .file-list {
            margin-top: 10px;
        }
        
        .file-item {
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .file-name {
            flex-grow: 1;
        }
        
        .file-action {
            color: #667eea;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-success {
            background-color: #d4edda;
            color: #155724;
        }
        
        .status-error {
            background-color: #f8d7da;
            color: #721c24;
        }
        
        .status-info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>网络拓扑可视化</h1>
            <p>基于CSR图的网络通信子图可视化系统</p>
        </div>
        
        <div class="tab-container">
            <div class="tabs">
                <div class="tab active" onclick="switchTab(1)">上传CSV提取子图</div>
                <div class="tab" onclick="switchTab(2)">上传JSON文件</div>
                <div class="tab" onclick="switchTab(3)">已上传文件</div>
            </div>
        </div>
        
        <!-- 消息显示 -->
        <div id="message" class="message"></div>
        
        <!-- 加载动画 -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p id="loadingText">处理中，请稍候...</p>
        </div>
        
        <!-- Tab 1: 上传CSV提取子图 -->
        <div id="tab1" class="tab-content active">
            <div class="card">
                <h2>上传CSV文件并提取子图</h2>
                
                <div class="form-group">
                    <label>上传CSV数据文件：</label>
                    <div class="file-upload">
                        <button class="btn btn-block" onclick="document.getElementById('csvFile').click()">
                            选择CSV文件
                        </button>
                        <input type="file" id="csvFile" accept=".csv,.CSV" onchange="handleCsvFileSelect(this)" style="display: none;">
                    </div>
                    <div id="csvFileInfo" class="file-list"></div>
                </div>
                
                <div class="form-group">
                    <label>目标IP地址：</label>
                    <input type="text" id="targetIp" class="form-control" 
                           placeholder="例如: 192.168.1.1" required>
                </div>
                
                <div class="form-group">
                    <label>JSON输出文件名（可选）：</label>
                    <input type="text" id="jsonOutputName" class="form-control" 
                           placeholder="例如: subgraph_192.168.1.1.json">
                    <small style="color: #666;">留空将自动生成文件名</small>
                </div>
                
                <button class="btn btn-success btn-block" onclick="extractSubgraph()">
                    提取子图
                </button>
            </div>
        </div>
        
        <!-- Tab 2: 上传JSON文件 -->
        <div id="tab2" class="tab-content">
            <div class="card">
                <h2>上传JSON子图文件</h2>
                
                <div class="form-group">
                    <label>选择JSON文件：</label>
                    <div class="file-upload">
                        <button class="btn btn-block" onclick="document.getElementById('jsonFile').click()">
                            选择JSON文件
                        </button>
                        <input type="file" id="jsonFile" accept=".json" onchange="handleJsonFileSelect(this)" style="display: none;">
                    </div>
                    <div id="jsonFileInfo" class="file-list"></div>
                </div>
                
                <div id="uploadedJsonInfo" style="display: none; margin-top: 20px;">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">中心IP</div>
                            <div class="info-value" id="infoCentralIp">-</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">节点数</div>
                            <div class="info-value" id="infoNodeCount">0</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">边数</div>
                            <div class="info-value" id="infoEdgeCount">0</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">连通分量大小</div>
                            <div class="info-value" id="infoComponentSize">0</div>
                        </div>
                    </div>
                    
                    <div class="legend">
                        <div class="legend-item">
                            <div class="color-box source-node"></div>
                            <span>源节点</span>
                        </div>
                        <div class="legend-item">
                            <div class="color-box dest-node"></div>
                            <span>目的节点</span>
                        </div>
                        <div class="legend-item">
                            <div class="color-box both-node"></div>
                            <span>既是源又是目的</span>
                        </div>
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn" onclick="generateVisualization('png')">
                            生成静态图 (PNG)
                        </button>
                        <button class="btn btn-secondary" onclick="generateVisualization('html')">
                            生成交互式图 (HTML)
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Tab 3: 已上传文件 -->
        <div id="tab3" class="tab-content">
            <div class="card">
                <h2>已上传文件</h2>
                
                <div class="form-group">
                    <button class="btn" onclick="refreshFileList()">刷新文件列表</button>
                </div>
                
                <div class="form-group">
                    <h3>CSV文件</h3>
                    <div id="csvFileList" class="file-list">
                        <!-- CSV文件列表将在这里显示 -->
                    </div>
                </div>
                
                <div class="form-group">
                    <h3>JSON文件</h3>
                    <div id="jsonFileList" class="file-list">
                        <!-- JSON文件列表将在这里显示 -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 结果展示区 -->
        <div id="resultSection" class="result-section" style="display: none;">
            <div class="card">
                <h2>可视化结果</h2>
                
                <div id="currentFileInfo" class="info-grid" style="margin-bottom: 20px;"></div>
                
                <div id="visualizationContainer" class="visualization-container">
                    <!-- 可视化内容将在这里显示 -->
                </div>
                
                <div class="btn-group" style="margin-top: 20px;">
                    <button class="btn" onclick="downloadVisualization()">下载结果</button>
                    <button class="btn btn-secondary" onclick="clearResults()">清除结果</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentCsvFile = null;
        let currentJsonFile = null;
        let currentVisualization = null;
        
        // 切换标签页
        function switchTab(tabNumber) {
            // 隐藏所有标签内容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 移除所有标签的激活状态
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 显示选中的标签内容
            document.getElementById(`tab${tabNumber}`).classList.add('active');
            
            // 激活选中的标签
            document.querySelectorAll('.tab')[tabNumber - 1].classList.add('active');
        }
        
        // 处理CSV文件选择
        function handleCsvFileSelect(input) {
            const file = input.files[0];
            if (file) {
                uploadCsvFile(file);
            }
        }
        
        // 上传CSV文件
        function uploadCsvFile(file) {
            showLoading('正在上传CSV文件...');
            hideMessage();
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/api/upload_csv', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    currentCsvFile = data.filename;
                    showFileInfo('csvFileInfo', file.name, 'success');
                    showMessage('CSV文件上传成功！', 'success');
                    refreshFileList();
                } else {
                    showMessage(`上传失败: ${data.error}`, 'error');
                }
            })
            .catch(error => {
                hideLoading();
                showMessage(`上传失败: ${error.message}`, 'error');
            });
        }
        
        // 处理JSON文件选择
        function handleJsonFileSelect(input) {
            const file = input.files[0];
            if (file) {
                uploadJsonFile(file);
            }
        }
        
        // 上传JSON文件
        function uploadJsonFile(file) {
            showLoading('正在上传JSON文件...');
            hideMessage();
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/api/upload_json', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    currentJsonFile = data.filename;
                    showFileInfo('jsonFileInfo', file.name, 'success');
                    displayJsonInfo(data.info);
                    showMessage('JSON文件上传成功！', 'success');
                    refreshFileList();
                } else {
                    showMessage(`上传失败: ${data.error}`, 'error');
                }
            })
            .catch(error => {
                hideLoading();
                showMessage(`上传失败: ${error.message}`, 'error');
            });
        }
        
        // 显示文件信息
        function showFileInfo(containerId, filename, status) {
            const container = document.getElementById(containerId);
            const statusClass = status === 'success' ? 'status-success' : 'status-error';
            const statusText = status === 'success' ? '已上传' : '失败';
            
            container.innerHTML = `
                <div class="file-item">
                    <div class="file-name">${filename}</div>
                    <div class="status-badge ${statusClass}">${statusText}</div>
                </div>
            `;
        }
        
        // 显示JSON文件信息
        function displayJsonInfo(info) {
            document.getElementById('infoCentralIp').textContent = info.central_ip || '-';
            document.getElementById('infoNodeCount').textContent = info.total_nodes || 0;
            document.getElementById('infoEdgeCount').textContent = info.total_edges || 0;
            document.getElementById('infoComponentSize').textContent = info.component_size || 0;
            
            document.getElementById('uploadedJsonInfo').style.display = 'block';
        }
        
        // 提取子图
        function extractSubgraph() {
            const targetIp = document.getElementById('targetIp').value.trim();
            const jsonOutputName = document.getElementById('jsonOutputName').value.trim();
            
            if (!currentCsvFile) {
                showMessage('请先上传CSV文件', 'error');
                return;
            }
            
            if (!targetIp) {
                showMessage('请输入目标IP地址', 'error');
                return;
            }
            
            showLoading('正在提取子图，这可能需要一些时间...');
            hideMessage();
            
            const requestData = {
                csv_filename: currentCsvFile,
                target_ip: targetIp
            };
            
            if (jsonOutputName) {
                requestData.json_output_name = jsonOutputName;
            }
            
            fetch('/api/extract_subgraph', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    currentJsonFile = data.json_filename;
                    displayJsonInfo(data.info);
                    showMessage('子图提取成功！', 'success');
                    
                    // 自动切换到JSON标签页
                    switchTab(2);
                } else {
                    showMessage(`提取失败: ${data.error}`, 'error');
                }
            })
            .catch(error => {
                hideLoading();
                showMessage(`提取失败: ${error.message}`, 'error');
            });
        }
        
        // 生成可视化
        function generateVisualization(type) {
            if (!currentJsonFile) {
                showMessage('请先上传或提取JSON文件', 'error');
                return;
            }
            
            showLoading(`正在生成${type === 'png' ? '静态图' : '交互式图'}...`);
            hideMessage();
            
            fetch('/api/generate_visualization', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    json_filename: currentJsonFile,
                    type: type
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    showVisualization(data.url, data.filename, data.type);
                    showMessage('可视化生成成功！', 'success');
                } else {
                    showMessage(`生成失败: ${data.error}`, 'error');
                }
            })
            .catch(error => {
                hideLoading();
                showMessage(`生成失败: ${error.message}`, 'error');
            });
        }
        
        // 显示可视化结果
        function showVisualization(url, filename, type) {
            const container = document.getElementById('visualizationContainer');
            
            if (type === 'png') {
                container.innerHTML = `
                    <div class="visualization">
                        <img src="${url}" alt="网络拓扑图" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                `;
            } else if (type === 'html') {
                container.innerHTML = `
                    <div class="visualization">
                        <iframe src="${url}" style="width: 100%; height: 100%; border: none;"></iframe>
                    </div>
                `;
            }
            
            // 保存当前可视化信息
            currentVisualization = { url, filename, type };
            
            // 显示结果区域
            document.getElementById('resultSection').style.display = 'block';
            
            // 滚动到结果区域
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 下载可视化结果
        function downloadVisualization() {
            if (!currentVisualization) {
                showMessage('没有可下载的可视化结果', 'error');
                return;
            }
            
            const link = document.createElement('a');
            link.href = currentVisualization.url;
            link.download = currentVisualization.filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        // 清除结果
        function clearResults() {
            document.getElementById('visualizationContainer').innerHTML = '';
            document.getElementById('resultSection').style.display = 'none';
            currentVisualization = null;
        }
        
        // 刷新文件列表
        function refreshFileList() {
            fetch('/api/get_uploaded_files')
            .then(response => response.json())
            .then(data => {
                updateFileList('csvFileList', data.csv_files, 'CSV');
                updateFileList('jsonFileList', data.json_files, 'JSON');
            })
            .catch(error => {
                console.error('获取文件列表失败:', error);
            });
        }
        
        // 更新文件列表显示
        function updateFileList(containerId, files, fileType) {
            const container = document.getElementById(containerId);
            
            if (!files || files.length === 0) {
                container.innerHTML = `<p style="color: #666; padding: 10px;">没有${fileType}文件</p>`;
                return;
            }
            
            let html = '';
            files.forEach(filename => {
                html += `
                    <div class="file-item">
                        <div class="file-name">${filename}</div>
                        <div>
                            <span class="file-action" onclick="useFile('${filename}', '${fileType.toLowerCase()}')">使用</span>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 使用已有文件
        function useFile(filename, fileType) {
            if (fileType === 'csv') {
                currentCsvFile = filename;
                showFileInfo('csvFileInfo', filename, 'success');
                showMessage(`已选择CSV文件: ${filename}`, 'success');
                switchTab(1);
            } else if (fileType === 'json') {
                currentJsonFile = filename;
                // 加载JSON文件信息
                fetchJsonFileInfo(filename);
                switchTab(2);
            }
        }
        
        // 获取JSON文件信息
        function fetchJsonFileInfo(filename) {
            showLoading('正在加载文件信息...');
            
            // 创建模拟的FormData上传
            const formData = new FormData();
            const blob = new Blob([''], { type: 'application/json' });
            const file = new File([blob], filename);
            formData.append('file', file);
            
            fetch('/api/upload_json', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    showFileInfo('jsonFileInfo', filename, 'success');
                    displayJsonInfo(data.info);
                    showMessage(`已加载JSON文件: ${filename}`, 'success');
                } else {
                    showMessage(`加载失败: ${data.error}`, 'error');
                }
            })
            .catch(error => {
                hideLoading();
                showMessage(`加载失败: ${error.message}`, 'error');
            });
        }
        
        // 显示加载动画
        function showLoading(text = '处理中，请稍候...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').style.display = 'block';
        }
        
        // 隐藏加载动画
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // 显示消息
        function showMessage(message, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // 5秒后自动隐藏
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // 隐藏消息
        function hideMessage() {
            document.getElementById('message').style.display = 'none';
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('网络拓扑可视化系统已加载');
            refreshFileList();
        });
    </script>
</body>
</html>
