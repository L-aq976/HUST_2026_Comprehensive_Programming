<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .container { max-width: 1200px; }
        .status-running { color: green; font-weight: bold; }
        .status-stopped { color: red; }
        .result-area { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-top: 10px; max-height: 400px; overflow-y: auto; }
        .tab-content { margin-top: 20px; }
        .analysis-card { margin-bottom: 15px; }
        .stat-item { padding: 10px; border-left: 4px solid #007bff; margin: 5px 0; background: white; }
        .warning-item { border-left-color: #ffc107; }
        .danger-item { border-left-color: #dc3545; }
        .success-item { border-left-color: #28a745; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">
            <i class="fas fa-network-wired"></i> 网络通信分析系统
        </h1>
        
        <!-- 状态显示 -->
        <div class="card mb-3">
            <div class="card-body">
                <h5><i class="fas fa-info-circle"></i> 系统状态</h5>
                <div id="statusDisplay">
                    <span class="status-stopped">分析程序未运行</span>
                </div>
            </div>
        </div>
        
        <!-- 文件上传 -->
        <div class="card mb-3">
            <div class="card-header">
                <h5><i class="fas fa-upload"></i> 1. 上传数据文件</h5>
            </div>
            <div class="card-body">
                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label">选择网络流量CSV文件</label>
                        <input type="file" class="form-control" id="csvFile" accept=".csv" required>
                        <div class="form-text">请确保C++程序已编译（运行make命令）</div>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-play"></i> 上传并启动分析
                    </button>
                </form>
                <div id="uploadStatus" class="mt-2"></div>
            </div>
        </div>
        
        <!-- 分析功能 -->
        <div class="card" id="analysisSection" style="display: none;">
            <div class="card-header">
                <h5><i class="fas fa-chart-bar"></i> 2. 网络分析功能</h5>
            </div>
            <div class="card-body">
                <!-- 选项卡 -->
                <ul class="nav nav-tabs" id="analysisTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="stats-tab" data-bs-toggle="tab" data-bs-target="#stats" type="button" role="tab">
                            <i class="fas fa-chart-pie"></i> 统计分析
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="security-tab" data-bs-toggle="tab" data-bs-target="#security" type="button" role="tab">
                            <i class="fas fa-shield-alt"></i> 安全分析
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="topology-tab" data-bs-toggle="tab" data-bs-target="#topology" type="button" role="tab">
                            <i class="fas fa-project-diagram"></i> 拓扑分析
                        </button>
                    </li>
                </ul>
                
                <div class="tab-content" id="analysisTabContent">
                    <!-- 统计分析 -->
                    <div class="tab-pane fade show active" id="stats" role="tabpanel">
                        <div class="mt-3">
                            <div class="row">
                                <div class="col-md-4">
                                    <div class="analysis-card">
                                        <h6><i class="fas fa-traffic-light"></i> 流量统计</h6>
                                        <button class="btn btn-outline-primary btn-sm" onclick="analyzeTrafficStatistics()">
                                            <i class="fas fa-chart-bar"></i> 执行分析
                                        </button>
                                        <div id="trafficResult" class="result-area"></div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="analysis-card">
                                        <h6><i class="fas fa-lock"></i> HTTPS统计</h6>
                                        <button class="btn btn-outline-success btn-sm" onclick="analyzeHttpsStatistics()">
                                            <i class="fas fa-shield-alt"></i> 执行分析
                                        </button>
                                        <div id="httpsResult" class="result-area"></div>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="analysis-card">
                                        <h6><i class="fas fa-exchange-alt"></i> 单向流量统计</h6>
                                        <button class="btn btn-outline-warning btn-sm" onclick="analyzeUnidirectionalTraffic()">
                                            <i class="fas fa-exclamation-triangle"></i> 执行分析
                                        </button>
                                        <div id="unidirectionalResult" class="result-area"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 安全分析 -->
                    <div class="tab-pane fade" id="security" role="tabpanel">
                        <div class="mt-3">
                            <div class="analysis-card">
                                <h6><i class="fas fa-ban"></i> IP安全规则分析</h6>
                                <form id="ipRangeForm" class="row g-3">
                                    <div class="col-md-4">
                                        <input type="text" class="form-control" placeholder="源IP" name="ip1" required>
                                    </div>
                                    <div class="col-md-4">
                                        <input type="text" class="form-control" placeholder="起始IP" name="ip2" required>
                                    </div>
                                    <div class="col-md-4">
                                        <input type="text" class="form-control" placeholder="结束IP" name="ip3" required>
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-warning">
                                            <i class="fas fa-search"></i> 检查违规会话
                                        </button>
                                    </div>
                                </form>
                                <div id="ipRangeResult" class="result-area"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 拓扑分析 -->
                    <div class="tab-pane fade" id="topology" role="tabpanel">
                        <div class="mt-3">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="analysis-card">
                                        <h6><i class="fas fa-sitemap"></i> 星型结构分析</h6>
                                        <button class="btn btn-outline-info btn-sm" onclick="analyzeStarStructures()">
                                            <i class="fas fa-star"></i> 检测星型结构
                                        </button>
                                        <div id="starResult" class="result-area"></div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="analysis-card">
                                        <h6><i class="fas fa-route"></i> 最短路径分析</h6>
                                        <form id="pathForm" class="row g-3">
                                            <div class="col-md-6">
                                                <input type="text" class="form-control" placeholder="源IP" name="src_ip" required>
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" class="form-control" placeholder="目标IP" name="dst_ip" required>
                                            </div>
                                            <div class="col-12">
                                                <div class="btn-group" role="group">
                                                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="analyzeShortestPath('congestion')">
                                                        <i class="fas fa-tachometer-alt"></i> 拥塞程度
                                                    </button>
                                                    <button type="button" class="btn btn-outline-info btn-sm" onclick="analyzeShortestPath('hops')">
                                                        <i class="fas fa-shoe-prints"></i> 跳数
                                                    </button>
                                                </div>
                                            </div>
                                        </form>
                                        <div id="pathResult" class="result-area"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <hr>
                <div class="d-flex justify-content-between">
                    <button id="graphInfoBtn" class="btn btn-secondary">
                        <i class="fas fa-info-circle"></i> 获取图信息
                    </button>
                    <button id="stopBtn" class="btn btn-danger">
                        <i class="fas fa-stop"></i> 停止分析程序
                    </button>
                </div>
                <div id="graphInfoResult" class="result-area mt-2"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 更新状态显示
        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const statusDiv = document.getElementById('statusDisplay');
                    if (data.status === 'running') {
                        statusDiv.innerHTML = '<span class="status-running"><i class="fas fa-check-circle"></i> 分析程序运行中</span>';
                        document.getElementById('analysisSection').style.display = 'block';
                    } else {
                        statusDiv.innerHTML = '<span class="status-stopped"><i class="fas fa-times-circle"></i> 分析程序未运行</span>';
                        document.getElementById('analysisSection').style.display = 'none';
                    }
                });
        }
        
        // 文件上传
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('csvFile').files[0]);
            
            const statusDiv = document.getElementById('uploadStatus');
            statusDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> 上传中...</div>';
            
            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    statusDiv.innerHTML = `<div class="alert alert-success"><i class="fas fa-check"></i> ${data.message}</div>`;
                    updateStatus();
                } else {
                    statusDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                statusDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 上传失败</div>';
            });
        });
        
        // IP范围分析
        document.getElementById('ipRangeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                ip1: formData.get('ip1'),
                ip2: formData.get('ip2'),
                ip3: formData.get('ip3')
            };
            
            const resultDiv = document.getElementById('ipRangeResult');
            resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> 分析中...</div>';
            
            fetch('/api/analyze/ip_range', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<pre>${data.result}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 分析失败</div>';
            });
        });
        
        // 最短路径分析
        function analyzeShortestPath(method) {
            const src_ip = document.querySelector('input[name="src_ip"]').value;
            const dst_ip = document.querySelector('input[name="dst_ip"]').value;
            
            if (!src_ip || !dst_ip) {
                alert('请输入源IP和目标IP');
                return;
            }
            
            const resultDiv = document.getElementById('pathResult');
            resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> 分析中...</div>';
            
            const endpoint = method === 'hops' ? '/api/analyze/shortest_path_by_hops' : '/api/analyze/shortest_path';
            const methodName = method === 'hops' ? '跳数' : '拥塞程度';
            
            fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({src_ip, dst_ip})
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<div class="alert alert-success">基于${methodName}的最短路径：</div><pre>${data.result}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 分析失败</div>';
            });
        }
        
        // 统计分析功能
        function analyzeTrafficStatistics() {
            const resultDiv = document.getElementById('trafficResult');
            resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> 流量统计中...</div>';
            
            fetch('/api/analyze/traffic_statistics', {method: 'POST'})
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<pre>${data.result}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 分析失败</div>';
            });
        }
        
        function analyzeHttpsStatistics() {
            const resultDiv = document.getElementById('httpsResult');
            resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> HTTPS统计中...</div>';
            
            fetch('/api/analyze/https_statistics', {method: 'POST'})
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<pre>${data.result}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 分析失败</div>';
            });
        }
        
        function analyzeUnidirectionalTraffic() {
            const resultDiv = document.getElementById('unidirectionalResult');
            resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> 单向流量统计中...</div>';
            
            fetch('/api/analyze/unidirectional_traffic', {method: 'POST'})
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<pre>${data.result}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 分析失败</div>';
            });
        }
        
        function analyzeStarStructures() {
            const resultDiv = document.getElementById('starResult');
            resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> 星型结构分析中...</div>';
            
            fetch('/api/analyze/star_structures', {method: 'POST'})
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<pre>${data.result}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 分析失败</div>';
            });
        }
        
        // 图信息
        document.getElementById('graphInfoBtn').addEventListener('click', function() {
            const resultDiv = document.getElementById('graphInfoResult');
            resultDiv.innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin"></i> 获取中...</div>';
            
            fetch('/api/graph_info')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<pre>${data.result}</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle"></i> 获取失败</div>';
            });
        });
        
        // 停止分析
        document.getElementById('stopBtn').addEventListener('click', function() {
            if (confirm('确定要停止分析程序吗？')) {
                fetch('/api/stop')
                    .then(response => response.json())
                    .then(data => {
                        alert(data.message);
                        updateStatus();
                    });
            }
        });
        
        // 初始状态检查
        updateStatus();
        // 每5秒更新一次状态
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
